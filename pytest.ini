[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# Markers
# ─────────────────────────────────────────────────────────────────────────────
markers =
    gpu: Tests that require a CUDA GPU (skip with -m "not gpu")
    not_gpu: Tests verified to run on CPU (default)
    slow: Tests that take more than 30 seconds

# ─────────────────────────────────────────────────────────────────────────────
# Test discovery
# ─────────────────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─────────────────────────────────────────────────────────────────────────────
# Output
# ─────────────────────────────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ─────────────────────────────────────────────────────────────────────────────
# Coverage (used with pytest-cov)
# ─────────────────────────────────────────────────────────────────────────────
# Run: pytest -m "not gpu" --cov=src --cov-report=term-missing
